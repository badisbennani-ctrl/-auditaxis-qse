<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Générateur de procédures ISO 9001, 14001, 45001 - Créez des procédures professionnelles et conformes en quelques secondes avec l'IA.">
    <meta name="author" content="AuditAxis QSE">

    <!-- Open Graph -->
    <meta property="og:title" content="Générateur de Procédures ISO Gratuit | AuditAxis QSE">
    <meta property="og:description" content="Générez des procédures QSE professionnelles conformes aux normes ISO 9001, 14001 et 45001.">
    <meta property="og:url" content="https://auditaxis-qse.com/procedure">
    <meta property="og:type" content="website">

    <title>Générateur de Procédures ISO | AuditAxis QSE</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="/config.js" defer></script>
    <script src="/header.js" defer></script>
    <script src="/procedure.js" defer></script>
    <style>
        .procedure-container {
            max-width: 1000px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        .form-section {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 2.5rem;
            margin-bottom: 2rem;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-soft);
        }
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .form-group label {
            font-weight: 600;
            color: var(--primary);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .form-group input, .form-group select, .form-group textarea {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 0.8rem;
            color: var(--text-primary);
            font-family: inherit;
            transition: all 0.3s ease;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(8, 145, 178, 0.2);
        }
        .checkbox-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-top: 1rem;
        }
        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            cursor: pointer;
        }
        .checkbox-item input {
            width: 1.2rem;
            height: 1.2rem;
            accent-color: var(--primary);
        }
        .btn-generate {
            width: 100%;
            padding: 1rem;
            font-size: 1.1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 1rem;
        }
        .result-section {
            display: none;
            background: var(--card-bg);
            border-radius: 16px;
            padding: 2.5rem;
            border: 1px solid var(--primary);
            margin-top: 2rem;
            animation: fadeIn 0.5s ease;
        }
        .procedure-content {
            background: #0f172a;
            color: #f8fafc;
            padding: 2rem;
            border-radius: 8px;
            font-family: 'Courier New', Courier, monospace;
            white-space: pre-wrap;
            overflow-x: auto;
            margin-top: 1.5rem;
            line-height: 1.6;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .actions-bar {
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
            margin-top: 1.5rem;
        }
        .loading-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 1.5rem;
        }
        .spinner {
            width: 60px;
            height: 60px;
            border: 5px solid rgba(8, 145, 178, 0.1);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s infinite linear;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .tag-norm {
            display: inline-block;
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 700;
            margin-right: 0.5rem;
        }
        .tag-9001 { background: rgba(8, 145, 178, 0.2); color: #0891b2; border: 1px solid #0891b2; }
        .tag-14001 { background: rgba(16, 185, 129, 0.2); color: #10b981; border: 1px solid #10b981; }
        .tag-45001 { background: rgba(245, 158, 11, 0.2); color: #f59e0b; border: 1px solid #f59e0b; }
    </style>
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="procedure-container">
        <section class="hero-mini">
            <h1 class="section-title">Générateur de Procédures</h1>
            <p class="section-subtitle">Générez instantanément des procédures ISO 9001, 14001 ou 45001 professionnelles et prêtes à l'emploi.</p>
        </section>

        <div class="form-section">
            <form id="procedureForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="norme">Norme ISO concernée</label>
                        <select id="norme" required>
                            <option value="">Sélectionnez une norme</option>
                            <option value="ISO 9001">ISO 9001:2015 — Qualité</option>
                            <option value="ISO 14001">ISO 14001:2015 — Environnement</option>
                            <option value="ISO 45001">ISO 45001:2018 — Santé & Sécurité</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="nomProcessus">Nom du processus</label>
                        <input type="text" id="nomProcessus" placeholder="ex: Gestion des non-conformités" required>
                    </div>
                    <div class="form-group">
                        <label for="secteur">Secteur d'activité</label>
                        <input type="text" id="secteur" placeholder="ex: Industrie manufacturière" required>
                    </div>
                    <div class="form-group">
                        <label for="taille">Taille de l'entreprise</label>
                        <select id="taille" required>
                            <option value="TPE (1-10 pers)">TPE (1-10 personnes)</option>
                            <option value="PME (11-50 pers)">PME (11-50 personnes)</option>
                            <option value="PME (51-250 pers)" selected>PME (51-250 personnes)</option>
                            <option value="ETI / Grande Entreprise">ETI / Grande Entreprise</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="description">Description succincte du processus</label>
                    <textarea id="description" rows="4" placeholder="Décrivez brièvement comment le processus fonctionne actuellement dans votre entreprise..." required></textarea>
                </div>

                <div class="form-group" style="margin-top: 1.5rem;">
                    <label>Éléments optionnels à inclure</label>
                    <div class="checkbox-group">
                        <label class="checkbox-item">
                            <input type="checkbox" name="elements" value="Risques associés" checked>
                            Analyse des risques
                        </label>
                        <label class="checkbox-item">
                            <input type="checkbox" name="elements" value="Documents associés" checked>
                            Liste des documents
                        </label>
                    </div>
                </div>

                <button type="submit" class="btn btn-generate" id="submitBtn">Générer la procédure</button>
            </form>
        </div>

        <div id="loading" class="loading-overlay">
            <div class="spinner"></div>
            <p style="color: white; font-family: 'Orbitron', sans-serif; letter-spacing: 2px;">Rédaction par l'IA en cours...</p>
            <p style="color: var(--text-secondary); font-size: 0.9rem;">Cela peut prendre jusqu'à 30 secondes</p>
        </div>

        <div id="result" class="result-section">
            <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); padding-bottom: 1rem;">
                <h2 id="resultTitle" style="margin: 0;">Procédure générée</h2>
                <div id="resultBadge"></div>
            </div>
            <div id="procedureOutput" class="procedure-content"></div>
            <div class="actions-bar">
                <button class="btn btn-outline" onclick="copyToClipboard()">Copier le texte</button>
                <button class="btn" onclick="downloadProcedure()">Télécharger (TXT)</button>
            </div>
        </div>
    </main>

    <footer></footer>

    <script>
        function copyToClipboard() {
            const text = document.getElementById('procedureOutput').innerText;
            navigator.clipboard.writeText(text).then(() => {
                alert('Procédure copiée dans le presse-papier !');
            });
        }

        function downloadProcedure() {
            const text = document.getElementById('procedureOutput').innerText;
            const title = document.getElementById('nomProcessus').value || 'procedure';
            const blob = new Blob([text], { type: 'text/plain' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `Procedure_${title.replace(/\s+/g, '_')}.txt`;
            a.click();
        }
    </script>
</body>
</html>
